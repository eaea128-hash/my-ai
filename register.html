<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>註冊 — Smart Archie</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --green: #006633; --green-dark: #004d26; --bd: #e2e8f0; --text: #334155; --muted: #64748b; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .card { background: #fff; border: 1px solid var(--bd); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: var(--green); }
    .logo p { font-size: 12px; color: var(--muted); margin-top: 4px; }
    label { font-size: 11px; font-weight: 700; color: var(--green); text-transform: uppercase; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--bd); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: 0.2s; }
    input:focus { border-color: var(--green); }
    .field { margin-bottom: 16px; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .btn { width: 100%; padding: 13px; background: var(--green); color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 8px; transition: 0.2s; font-family: inherit; }
    .btn:hover:not(:disabled) { background: var(--green-dark); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .links { margin-top: 18px; text-align: center; font-size: 13px; color: var(--muted); }
    .links a { color: var(--green); text-decoration: none; font-weight: 500; }
    .links a:hover { text-decoration: underline; }
    .msg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 20px; }
    .msg.error { color: #9f1239; }
    .msg.success { color: #166534; }
    /* 忘記密碼彈窗 */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 32px 28px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .btn-sec { flex: 1; padding: 11px; border: 1.5px solid var(--bd); border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; font-family: inherit; }
    .btn-pri { flex: 1; padding: 11px; background: var(--green); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; }
    .btn-pri:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Smart Archie</h1>
    <p>建立你的帳號</p>
  </div>
  <div class="field"><label>電子郵件</label><input type="email" id="email" placeholder="your@email.com" /></div>
  <div class="field">
    <label>密碼</label>
    <input type="password" id="password" placeholder="至少 6 個字元" />
    <div class="hint">密碼需至少 6 個字元</div>
  </div>
  <div class="field">
    <label>確認密碼</label>
    <input type="password" id="password2" placeholder="再輸入一次" onkeydown="if(event.key==='Enter')register()" />
  </div>
  <button class="btn" id="btn-reg" onclick="register()">建立帳號</button>
  <p class="msg" id="msg"></p>
  <div class="links">
    已有帳號？<a href="/login.html">登入</a>
    &nbsp;·&nbsp;
    <a href="#" onclick="openForgot(event)">忘記密碼？</a>
  </div>
</div>

<!-- 忘記密碼彈窗 -->
<div class="overlay" id="forgot-overlay">
  <div class="modal">
    <h2>重設密碼</h2>
    <p>輸入你的帳號信箱，我們將發送重設連結給你。</p>
    <div class="field"><label>電子郵件</label><input type="email" id="forgot-email" placeholder="your@email.com" /></div>
    <p class="msg" id="forgot-msg"></p>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeForgot()">取消</button>
      <button class="btn-pri" id="btn-send" onclick="sendReset()">發送連結</button>
    </div>
  </div>
</div>

<script type="module">
  import { supabase } from './supabase.js'

  function setMsg(id, text, type) {
    const el = document.getElementById(id)
    el.textContent = text
    el.className = 'msg ' + (type || '')
  }

  async function register() {
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const password2 = document.getElementById('password2').value
    if (!email || !password) { setMsg('msg', '請填寫所有欄位', 'error'); return }
    if (password !== password2) { setMsg('msg', '兩次密碼不一致', 'error'); return }
    if (password.length < 6) { setMsg('msg', '密碼至少需要 6 個字元', 'error'); return }

    const btn = document.getElementById('btn-reg')
    btn.disabled = true
    setMsg('msg', '註冊中...')

    const { error } = await supabase.auth.signUp({ email, password })
    if (error) {
      setMsg('msg', '註冊失敗：' + error.message, 'error')
      btn.disabled = false
      return
    }
    setMsg('msg', '註冊成功！請前往信箱確認後登入', 'success')
    setTimeout(() => { window.location.href = '/login.html' }, 2500)
  }

  function openForgot(e) {
    e.preventDefault()
    const emailVal = document.getElementById('email').value.trim()
    if (emailVal) document.getElementById('forgot-email').value = emailVal
    document.getElementById('forgot-overlay').classList.add('show')
    document.getElementById('forgot-msg').textContent = ''
  }

  function closeForgot() {
    document.getElementById('forgot-overlay').classList.remove('show')
  }

  async function sendReset() {
    const email = document.getElementById('forgot-email').value.trim()
    if (!email) { setMsg('forgot-msg', '請輸入信箱', 'error'); return }

    const btn = document.getElementById('btn-send')
    btn.disabled = true
    setMsg('forgot-msg', '發送中...')

    const redirectTo = window.location.origin + '/reset.html'
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo })

    if (error) {
      setMsg('forgot-msg', '發送失敗：' + error.message, 'error')
      btn.disabled = false
      return
    }
    setMsg('forgot-msg', '重設連結已發送，請檢查信箱', 'success')
    btn.disabled = false
  }

  window.register = register
  window.openForgot = openForgot
  window.closeForgot = closeForgot
  window.sendReset = sendReset
</script>
</body>
</html>
