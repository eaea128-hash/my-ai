<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Smart Archie</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #006633; --green-dark: #004d26; --bg: #f8fafc;
      --sur: #ffffff; --navy: #1e293b; --bd: #e2e8f0; --muted: #64748b; --text: #334155;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--green); height: 58px; display: flex; align-items: center; padding: 0 28px; color: #fff; position: sticky; top: 0; z-index: 200; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .topbar-brand { font-size: 18px; font-weight: 700; }
    .topbar-right { font-size: 12px; display: flex; gap: 12px; align-items: center; }
    .topbar-right a { color: #fff; opacity: 0.75; text-decoration: underline; cursor: pointer; }

    .container { max-width: 900px; margin: 36px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }

    .welcome-card { background: var(--sur); border: 1px solid var(--bd); border-radius: 14px; padding: 28px 32px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .welcome-text h2 { font-size: 20px; font-weight: 700; color: var(--navy); }
    .welcome-text p { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .btn-new { padding: 12px 24px; background: var(--green); color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.2s; font-family: inherit; }
    .btn-new:hover { background: var(--green-dark); }

    .quota-bar { background: var(--sur); border: 1px solid var(--bd); border-radius: 14px; padding: 16px 24px; display: flex; align-items: center; gap: 14px; font-size: 13px; }
    .quota-label { color: var(--muted); white-space: nowrap; }
    .quota-track { flex: 1; height: 8px; background: var(--bd); border-radius: 4px; overflow: hidden; }
    .quota-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.5s; }
    .quota-count { font-weight: 700; color: var(--navy); white-space: nowrap; }

    .history-card { background: var(--sur); border: 1px solid var(--bd); border-radius: 14px; overflow: hidden; }
    .history-header { background: #f1f5f9; padding: 14px 24px; font-size: 11px; font-weight: 700; color: var(--navy); border-bottom: 1px solid var(--bd); text-transform: uppercase; letter-spacing: 0.05em; }
    .history-body { padding: 8px 0; }

    .h-item { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 16px; transition: background 0.15s; }
    .h-item:last-child { border-bottom: none; }
    .h-item:hover { background: #f8fafc; }
    .h-icon { width: 40px; height: 40px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .h-info { flex: 1; min-width: 0; }
    .h-name { font-size: 14px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .h-tag { background: #f1f5f9; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 500; color: var(--text); }
    .btn-view { padding: 7px 16px; border: 1.5px solid var(--green); color: var(--green); background: #fff; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; transition: 0.2s; flex-shrink: 0; }
    .btn-view:hover { background: var(--green); color: #fff; }

    .empty { padding: 60px; text-align: center; color: var(--muted); font-size: 14px; }
    .loading { padding: 40px; text-align: center; color: var(--green); font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid #eee; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { padding: 24px; color: #9f1239; font-size: 13px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Smart Archie <span style="font-weight:300;font-size:12px;opacity:0.7">| 金融合規引擎</span></div>
  <div class="topbar-right">
    <span id="user-email"></span>
    <a id="btn-logout">登出</a>
  </div>
</div>

<div class="container">
  <div class="welcome-card">
    <div class="welcome-text">
      <h2>歡迎回來</h2>
      <p>開始新的合規分析，或查看過往報告。</p>
    </div>
    <a class="btn-new" href="/analyze.html">✦ 新增分析</a>
  </div>

  <div class="quota-bar">
    <span class="quota-label">本月用量</span>
    <div class="quota-track"><div class="quota-fill" id="quota-fill" style="width:0%"></div></div>
    <span class="quota-count" id="quota-text">載入中...</span>
  </div>

  <div class="history-card">
    <div class="history-header">歷史分析報告</div>
    <div class="history-body" id="history-body">
      <div class="loading"><div class="spinner"></div>載入中...</div>
    </div>
  </div>
</div>

<script type="module">
  import { supabase } from './supabase.js'

  const STRATEGY_LABEL = { Rehost: 'Rehost 搬遷', Replatform: 'Replatform 修整', Refactor: 'Refactor 重構' }
  const COMPLIANCE_LABEL = { critical: '重大委外', normal: '一般委外' }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function formatDate(d) {
    return new Date(d).toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
  }

  async function init() {
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = '/login.html'; return }
    const user = session.user

    document.getElementById('user-email').textContent = user.email
    document.getElementById('btn-logout').addEventListener('click', async () => {
      await supabase.auth.signOut()
      window.location.href = '/login.html'
    })

    await Promise.all([loadQuota(user), loadHistory(user)])
  }

  async function loadQuota(user) {
    const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString()
    const { count } = await supabase.from('usage_log')
      .select('id', { count: 'exact', head: true })
      .eq('user_id', user.id)
      .gte('created_at', monthStart)
    const used = count || 0
    const limit = 10
    document.getElementById('quota-fill').style.width = Math.min((used / limit) * 100, 100) + '%'
    document.getElementById('quota-text').textContent = `${used} / ${limit} 次`
  }

  async function loadHistory(user) {
    const body = document.getElementById('history-body')
    const { data, error } = await supabase
      .from('analysis_cache')
      .select('id, project_name, strategy, compliance, budget, created_at, result_json')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .limit(20)

    if (error) {
      body.innerHTML = `<div class="err">讀取失敗：${esc(error.message)}</div>`
      return
    }

    if (!data || data.length === 0) {
      body.innerHTML = `<div class="empty">尚無分析紀錄，點右上角「新增分析」開始第一筆。</div>`
      return
    }

    body.innerHTML = data.map((item, i) => `
      <div class="h-item">
        <div class="h-icon">📊</div>
        <div class="h-info">
          <div class="h-name">${esc(item.project_name || '未命名專案')}</div>
          <div class="h-meta">
            <span>${formatDate(item.created_at)}</span>
            ${item.strategy ? `<span class="h-tag">${esc(STRATEGY_LABEL[item.strategy] || item.strategy)}</span>` : ''}
            ${item.compliance ? `<span class="h-tag">${esc(COMPLIANCE_LABEL[item.compliance] || item.compliance)}</span>` : ''}
          </div>
        </div>
        <button class="btn-view" data-index="${i}">查看報告</button>
      </div>
    `).join('')

    body.querySelectorAll('.btn-view').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = data[parseInt(btn.dataset.index)]
        sessionStorage.setItem('archie_replay', JSON.stringify({
          projectName: item.project_name,
          strategy: item.strategy,
          compliance: item.compliance,
          budget: item.budget,
          result: item.result_json
        }))
        window.location.href = '/analyze.html?replay=1'
      })
    })
  }

  init()
</script>
</body>
</html>
