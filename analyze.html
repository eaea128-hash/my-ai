<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Archie — Financial Executive Brief</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f3ef;--sur:#fff;--sur2:#f9f8f5;
  --ink:#18181b;--ink2:#3f3f46;--mu:#71717a;--bd:#e4e0d8;
  --navy:#00204a;--gold:#c8961e;--goldl:#fdf6e3;
  --red:#c0392b;--redl:#fdf0ef;
  --grn:#1a6b45;--grnl:#edf7f2;
  --blue:#1a4fad;--bluel:#eef3fc;
  --amber:#92520a;--amberl:#fdf4e3;
  --r:8px;--sh:0 1px 3px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.65}
.topbar{background:var(--navy);height:56px;display:flex;align-items:center;padding:0 32px;gap:16px;position:sticky;top:0;z-index:200;color:#fff}
.top-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
.top-dot{width:7px;height:7px;background:var(--gold);border-radius:50%}
.shell{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 56px)}

/* LEFT PANEL */
.left-panel{background:var(--sur);border-right:1px solid var(--bd);overflow-y:auto}
.ip-head{padding:24px;border-bottom:1px solid var(--bd)}
.ip-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ip-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:11px;font-family:'DM Mono';text-transform:uppercase;color:var(--mu)}
.field input, .field textarea, .field select{width:100%;padding:9px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:13px;background:var(--sur2)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.trow{display:flex;gap:7px;flex-wrap:wrap}
.tbtn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--bd);font-size:12px;cursor:pointer;background:var(--sur2)}
.tbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* RIGHT PANEL */
.right-panel{padding:28px 32px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.sec{background:var(--sur);border:1px solid var(--bd);border-radius:10px;box-shadow:var(--sh);overflow:hidden}
.sch{padding:12px 18px;border-bottom:1px solid var(--bd);background:var(--sur2);font-weight:700;font-size:11px;color:var(--mu);display:flex;justify-content:space-between}
.scb{padding:18px}
.headline{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--navy);margin-bottom:10px}

/* CLOUD COMPARISON TABLE */
.cloud-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
.cloud-table th, .cloud-table td{border:1px solid var(--bd);padding:10px;text-align:left}
.cloud-table th{background:var(--sur2);color:var(--navy)}
.v-good{color:var(--grn);font-weight:700}
.v-bad{color:var(--red)}

.loader-wrap{display:none;flex-direction:column;align-items:center;padding:100px}
.loader-wrap.show{display:flex}
.lbar{width:200px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.lfill{height:100%;width:0%;background:var(--navy);transition:width 0.5s}

.out-wrap{display:none;flex-direction:column;gap:20px}
.out-wrap.show{display:flex}

.dp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.dp-card{padding:15px;border-radius:var(--r);border:1px solid;font-size:12px}
.dp-cost{background:var(--redl);border-color:#fca5a5}.dp-decide{background:var(--amberl);border-color:#fcd34d}.dp-min{background:var(--grnl);border-color:#86efac}
.btn-gen{padding:14px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-weight:700;width:100%}
</style>
</head>
<body>

<div class="topbar">
  <div class="top-logo"><div class="top-dot"></div>Smart Archie</div>
  <div style="margin-left:auto; font-size:12px; font-family:'DM Mono'" id="user-email">Loading...</div>
</div>

<div class="shell">
  <div class="left-panel">
    <div class="ip-head"><div class="ip-title">策略分析生成器</div></div>
    <div class="ip-body">
      <div class="field">
        <div class="flbl">📋 專案名稱</div>
        <input id="f-name" type="text" placeholder="例：核心系統搬遷雲端">
      </div>
      <div class="field">
        <div class="flbl">💬 需求描述</div>
        <textarea id="f-desc" placeholder="請描述痛點、目標系統、個資疑慮等..."></textarea>
      </div>
      
      <div class="fgrid">
        <div class="field">
          <div class="flbl">💰 預算規模</div>
          <select id="f-budget">
            <option value="s">500萬以下</option>
            <option value="m">500萬 - 2000萬</option>
            <option value="l">2000萬 - 5000萬</option>
            <option value="xl">5000萬以上</option>
          </select>
        </div>
        <div class="field">
          <div class="flbl">⏱ 預期時程</div>
          <select id="f-timeline">
            <option value="urgent">緊急 (3個月)</option>
            <option value="normal">標準 (6-9個月)</option>
            <option value="long">長期 (12個月+)</option>
          </select>
        </div>
      </div>

      <div class="field">
        <div class="flbl">🔐 敏感資料類型</div>
        <div class="trow" id="g-sensitive">
          <div class="tbtn on">個資 (PII)</div>
          <div class="tbtn">交易資料</div>
          <div class="tbtn">醫療資料</div>
        </div>
      </div>

      <div class="field">
        <div class="flbl">☁️ 雲端傾向 (多選)</div>
        <div class="trow" id="g-cloud">
          <div class="tbtn on">AWS</div>
          <div class="tbtn on">GCP</div>
          <div class="tbtn">Azure</div>
        </div>
      </div>
    </div>
    <div class="ip-footer" style="padding:24px">
        <div class="flbl" style="margin-bottom:8px">📄 輸出風格</div>
        <div class="trow" style="margin-bottom:15px">
            <div class="tbtn on" onclick="setStyle('exec', this)">高層版</div>
            <div class="tbtn" onclick="setStyle('pm', this)">PM 版</div>
            <div class="tbtn" onclick="setStyle('arch', this)">架構評估版</div>
        </div>
        <button class="btn-gen" id="btn-gen">✦ 生成分析報告</button>
    </div>
  </div>

  <div class="right-panel">
    <div id="loader" class="loader-wrap">
      <div class="lbar"><div class="lfill" id="lfill"></div></div>
      <p style="margin-top:15px; font-size:12px; color:var(--mu)" id="lmsg">正在分析金融法規...</p>
    </div>

    <div id="out-wrap" class="out-wrap">
      <div class="sec">
        <div class="sch"><span>📌 EXECUTIVE SUMMARY</span><span id="badge-style">高層版</span></div>
        <div class="scb">
          <div class="headline" id="res-headline"></div>
          <p id="res-exec-text" style="font-size:13px; color:var(--ink2)"></p>
          <div style="height:250px; margin:20px 0;"><canvas id="riskChart"></canvas></div>
        </div>
      </div>

      <div class="sec" id="sec-cloud-comp">
        <div class="sch"><span>☁️ CLOUD PROVIDER COMPARISON</span><span>金融合規評估</span></div>
        <div class="scb" id="cloud-comp-body">
            </div>
      </div>

      <div id="exec-only-zone">
        <div class="sec">
            <div class="sch"><span>📊 PPT OUTLINE (5 SLIDES)</span></div>
            <div class="scb" id="ppt-list"></div>
        </div>
        <div class="sec">
            <div class="sch"><span>🎯 DECISION POINTS</span></div>
            <div class="scb">
                <div class="dp-grid" id="dp-grid"></div>
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://oxownfzafrveihxhuxay.supabase.co', 'sb_publishable_qu_7OLWgfKpbmKnzDsQOuA_SUhryH67')

const $ = id => document.getElementById(id)
let currentStyle = 'exec'
let myChart = null

window.setStyle = (s, btn) => {
    currentStyle = s
    document.querySelectorAll('.ip-footer .tbtn').forEach(b => b.classList.remove('on'))
    btn.classList.add('on')
    $('badge-style').textContent = btn.textContent
}

document.querySelectorAll('#g-sensitive .tbtn, #g-cloud .tbtn').forEach(b => {
    b.onclick = () => b.classList.toggle('on')
})

$('btn-gen').onclick = async () => {
    const name = $('f-name').value
    const desc = $('f-desc').value
    if(!name || !desc) return alert('請填寫專案名稱與描述')

    $('loader').classList.add('show')
    $('out-wrap').classList.remove('show')
    $('lfill').style.width = '40%'

    try {
        const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name, desc, 
                style: currentStyle,
                budget: $('f-budget').value,
                timeline: $('f-timeline').value,
                clouds: [...document.querySelectorAll('#g-cloud .tbtn.on')].map(e => e.textContent)
            })
        })
        const json = await res.json()
        render(json.result)
    } catch (e) {
        alert('連線失敗，請確認後端 API 狀態')
    } finally {
        $('loader').classList.remove('show')
    }
}

function render(d) {
    $('out-wrap').classList.add('show')
    $('res-headline').textContent = d.headline || '策略評估報告'
    $('res-exec-text').textContent = d.execText || '未產出摘要'

    // 1. 渲染雲端廠商比較 (新增功能)
    renderCloudTable(d.cloudComparison)

    // 2. 渲染 PPT 與 決策 (針對高層版)
    if(currentStyle === 'exec') {
        $('exec-only-zone').style.display = 'block'
        $('ppt-list').innerHTML = (d.pptSlides || []).map(s => `
            <div style="margin-bottom:15px; border-left:4px solid var(--navy); padding-left:12px">
                <div style="font-weight:700; color:var(--navy)">Slide ${s.num}: ${s.title}</div>
                <div style="font-size:12px; margin-top:4px">${s.bullets.join(' | ')}</div>
            </div>
        `).join('')

        const dc = d.decisions || {cost:[], decide:[], min:[]}
        $('dp-grid').innerHTML = `
            <div class="dp-card dp-cost"><b>⚠️ 不行動代價</b><br>${dc.cost.join('<br>')}</div>
            <div class="dp-card dp-decide"><b>🎯 決策點</b><br>${dc.decide.join('<br>')}</div>
            <div class="dp-card dp-min"><b>🚀 MVP 路徑</b><br>${dc.min.join('<br>')}</div>
        `
    } else {
        $('exec-only-zone').style.display = 'none'
    }

    // 3. 繪製圖表
    renderChart(d.kpis)
}

function renderCloudTable(data) {
    // 模擬 AI 產出多雲比較數據 (若 API 未傳回則使用預設模板)
    const comparison = data || [
        {name: 'AWS', cost: '高 (PaaS豐富)', pros: '合規範本最齊全', cons: '成本管理複雜', status: '首選'},
        {name: 'GCP', cost: '中 (折扣優)', pros: 'AI/數據分析最強', cons: '金融案例較少', status: '次選'},
        {name: 'Azure', cost: '中', pros: '與地端 AD 無縫整合', cons: '介面邏輯較跳躍', status: '評估中'}
    ]
    
    $('cloud-comp-body').innerHTML = `
        <table class="cloud-table">
            <tr><th>廠商</th><th>預估成本</th><th>核心優點</th><th>潛在挑戰</th><th>建議</th></tr>
            ${comparison.map(c => `
                <tr>
                    <td><b>${c.name}</b></td>
                    <td>${c.cost}</td>
                    <td class="v-good">${c.pros}</td>
                    <td class="v-bad">${c.cons}</td>
                    <td><span style="background:var(--bluel); padding:2px 6px; border-radius:4px">${c.status}</span></td>
                </tr>
            `).join('')}
        </table>
    `
}

function renderChart(kpis) {
    const ctx = $('riskChart').getContext('2d')
    if(myChart) myChart.destroy()
    myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['合規風險', '技術難度', '資料敏感', '成本壓力', '時程壓力'],
            datasets: [{
                label: '分析維度',
                data: [kpis?.r?.v || 50, kpis?.c?.v || 50, 80, 60, 70],
                backgroundColor: 'rgba(0, 32, 74, 0.1)',
                borderColor: '#00204a',
                borderWidth: 2
            }]
        },
        options: { maintainAspectRatio: false }
    })
}

async function init() {
    const { data } = await supabase.auth.getUser()
    if(data?.user) $('user-email').textContent = data.user.email
    else window.location.href = 'login.html'
}
init()
</script>
</body>
</html>
