<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://oxownfzafrveihxhuxay.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_qu_70LWgfKpbmKnzDsQOuA_SUhryH67';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentStyle = 'exec';
  let chartInstance = null;
  let currentUser = null;
  const $ = id => document.getElementById(id);

  window.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/login.html'; return; }
    currentUser = session.user;
    $('user-email').textContent = currentUser.email;
    $('btn-logout').style.display = 'inline';
    await loadQuota();
  });

  document.getElementById('btn-logout').addEventListener('click', async (e) => {
    e.preventDefault();
    await sb.auth.signOut();
    window.location.href = '/login.html';
  });

  async function loadQuota() {
    try {
      const { count } = await sb.from('usage_log').select('id', { count: 'exact', head: true })
        .eq('user_id', currentUser.id)
        .gte('created_at', new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString());
      const used = count || 0;
      const limit = 10;
      $('quota-display').style.display = 'flex';
      $('quota-fill').style.width = Math.min((used/limit)*100, 100) + '%';
      $('quota-text').textContent = `${used}/${limit}`;
    } catch(e) { console.warn('quota', e); }
  }

  function changeStyle(s) {
    currentStyle = s;
    $('btn-exec').classList.toggle('on', s === 'exec');
    $('btn-pm').classList.toggle('on', s === 'pm');
  }

  async function generate() {
    const name = $('f-name').value.trim() || '未命名專案';
    const desc = $('f-desc').value.trim();
    if (!desc) { alert('請填寫業務描述'); return; }
    const btn = $('btn-gen');
    btn.disabled = true;
    $('right-panel').innerHTML = `<div class="loader"><div class="spinner"></div><div>AI 正在依據金管會規範進行合規建模...</div></div>`;
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) throw new Error('登入已過期，請重新登入');
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
        body: JSON.stringify({ projectName: name, description: desc, style: currentStyle, strategy: $('f-6r').value, compliance: $('f-compliance').value, budget: $('f-budget').value })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `伺服器錯誤 ${res.status}`);
      }
      const data = await res.json();
      const text = data.result || (data.content || []).map(c => c.text || '').join('');
      const d = JSON.parse(text.replace(/```json[\s\S]*?```|```/gi, '').trim());
      renderResult(d);
      await loadQuota();
    } catch (err) {
      console.error(err);
      $('right-panel').innerHTML = `<div class="loader" style="color:#be123c;"><div style="font-size:30px">⚠️</div><b>分析失敗</b><p style="font-size:12px;margin-top:8px">${err.message}</p><button onclick="generate()" style="margin-top:15px;padding:8px 20px;cursor:pointer;border-radius:8px;border:1px solid #bd2c2c;background:#fff1f2;color:#9f1239">重新嘗試</button></div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderResult(d) {
    const kpis = d.kpis || { compliance:75, lz:80, tech:60, roi:65, timeline:70 };
    const styleLabel = currentStyle === 'exec' ? '高層決策版' : '技術 PM 版';
    let html = `<div class="sec"><div class="sch">EXECUTIVE SUMMARY <span style="opacity:0.5">${styleLabel}</span></div><div class="scb"><div class="headline">${escHtml(d.headline||'策略評估報告')}</div><p style="font-size:13px;line-height:1.8">${escHtml(d.execText||'')}</p><div class="kpi-grid">${Object.keys(kpis).map(k=>`<div class="kpi-item"><div class="kpi-val">${kpis[k]}</div><div class="kpi-bar-bg"><div class="kpi-bar" id="bar-${k}"></div></div><div class="kpi-label">${k.toUpperCase()}</div></div>`).join('')}</div><div style="height:250px;margin-top:20px"><canvas id="radarCanvas"></canvas></div></div></div>`;
    if (currentStyle === 'exec') {
      const slides = d.pptSlides || d.ppt_outline || [];
      const dec = d.decisions || d.decision_points || {};
      html += `<div class="sec"><div class="sch">📊 PPT 策略彙報大綱</div><div class="scb">${slides.map(s=>`<div class="ppt-slide"><div class="ppt-head"><span>SLIDE ${s.num}</span> ${escHtml(s.title||'')}</div><div class="ppt-body">${(s.bullets||[]).map(b=>`• ${escHtml(b)}<br>`).join('')}</div></div>`).join('')}</div></div>`;
      html += `<div class="sec"><div class="sch">🎯 KEY DECISION POINTS</div><div class="scb"><div class="dp-grid"><div class="dp-card dp-cost"><b>不行動代價</b>${(dec.cost||[]).map(i=>`• ${escHtml(i)}<br>`).join('')}</div><div class="dp-card dp-decide"><b>核心決策點</b>${(dec.decide||[]).map(i=>`• ${escHtml(i)}<br>`).join('')}</div><div class="dp-card dp-min"><b>MVP 必做項目</b>${(dec.min||[]).map(i=>`• ${escHtml(i)}<br>`).join('')}</div></div></div></div>`;
    }
    $('right-panel').innerHTML = html;
    setTimeout(() => { Object.keys(kpis).forEach(k => { const b=$('bar-'+k); if(b) b.style.width=kpis[k]+'%'; }); }, 100);
    const ctx = $('radarCanvas').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'radar',
      data: { labels:['合規','Landing Zone','技術債','ROI','時程'], datasets:[{ label:'評分維度', data:Object.values(kpis), borderColor:'#006633', backgroundColor:'rgba(0,102,51,0.05)', pointBackgroundColor:'#c8961e' }] },
      options: { maintainAspectRatio:false, scales:{ r:{ min:0, max:100 } } }
    });
  }
</script>
</body>
</html>
