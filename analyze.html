<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Product Analyzer | 分析頁</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container {
      max-width: 960px;
      margin: 40px auto;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 30px;
    }

    p.desc {
      margin-top: 0;
      color: #666;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      box-sizing: border-box;
      line-height: 1.6;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button,
    a.button-link {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    #analyze-btn {
      background: #1f6feb;
      color: #fff;
    }

    #analyze-btn:disabled {
      background: #9bbcf3;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #e9edf5;
      color: #222;
    }

    .result-box {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 15px;
    }

    .hidden {
      display: none;
    }

    .loading {
      color: #555;
    }

    .error {
      color: #c62828;
      font-weight: bold;
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .user-email {
      color: #444;
      font-size: 14px;
    }

    .tip-box {
      background: #f4f8ff;
      border-left: 4px solid #1f6feb;
      padding: 14px 16px;
      border-radius: 8px;
      color: #355;
      font-size: 14px;
      margin-top: 12px;
    }

    ul.feature-list {
      margin: 8px 0 0 20px;
      padding: 0;
    }

    .result-block {
      margin-bottom: 18px;
    }

    .result-block h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: #1f355e;
    }

    .result-block p {
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div>
        <h1>AI Product Analyzer</h1>
        <div class="user-email">目前登入者：<span id="user-email">載入中...</span></div>
      </div>
      <a class="button-link secondary-btn" href="/dashboard.html">回 Dashboard</a>
    </div>

    <div class="card">
      <h2 class="section-title">開始新分析</h2>
      <p class="desc">請輸入你的產品需求、服務構想、MVP 想法，系統會回傳基礎分析結果。</p>

      <label for="user-input">需求內容</label>
      <textarea
        id="user-input"
        placeholder="例如：我要開發一個給中小企業 PM 使用的 AI 產品分析工具，請協助分析目標客群、核心功能、商業模式與主要風險。"
      ></textarea>

      <div class="actions">
        <button id="analyze-btn">Analyze</button>
        <button id="clear-btn" class="secondary-btn">清空</button>
      </div>

      <div class="tip-box">
        建議輸入越明確越好，例如：目標客群、使用情境、痛點、想收費的方式、你預計先做哪些功能。
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">分析結果</h2>
      <div id="result" class="result-box">尚未開始分析</div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    const userEmailEl = document.getElementById('user-email')
    const inputEl = document.getElementById('user-input')
    const analyzeBtn = document.getElementById('analyze-btn')
    const clearBtn = document.getElementById('clear-btn')
    const resultEl = document.getElementById('result')

    async function checkLogin() {
      const { data, error } = await supabase.auth.getUser()

      if (error || !data?.user) {
        alert('請先登入')
        window.location.href = '/login.html'
        return null
      }

      userEmailEl.textContent = data.user.email || '未知使用者'
      return data.user
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return ''
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;')
    }

    function renderResult(data) {
      const features = Array.isArray(data.features) ? data.features : []

      resultEl.innerHTML = `
        <div class="result-block">
          <h3>Product Summary</h3>
          <p>${escapeHtml(data.summary || '')}</p>
        </div>

        <div class="result-block">
          <h3>Target Users</h3>
          <p>${escapeHtml(data.targetUsers || '')}</p>
        </div>

        <div class="result-block">
          <h3>Core Features</h3>
          ${
            features.length
              ? `<ul class="feature-list">${features.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
              : '<p>無資料</p>'
          }
        </div>

        <div class="result-block">
          <h3>Business Model</h3>
          <p>${escapeHtml(data.businessModel || '')}</p>
        </div>

        <div class="result-block">
          <h3>Risks</h3>
          <p>${escapeHtml(data.risks || '')}</p>
        </div>

        <div class="result-block">
          <h3>Next Step</h3>
          <p>${escapeHtml(data.nextStep || '')}</p>
        </div>
      `
    }

    function setLoadingState(isLoading) {
      analyzeBtn.disabled = isLoading
      analyzeBtn.textContent = isLoading ? '分析中...' : 'Analyze'
    }

    clearBtn.addEventListener('click', () => {
      inputEl.value = ''
      resultEl.textContent = '尚未開始分析'
    })

    analyzeBtn.addEventListener('click', async () => {
      const user = await checkLogin()
      if (!user) return

      const inputText = inputEl.value.trim()

      if (!inputText) {
        alert('請先輸入需求內容')
        return
      }

      setLoadingState(true)
      resultEl.innerHTML = '<p class="loading">系統分析中，請稍候...</p>'

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ inputText })
        })

        const data = await res.json()

        if (!res.ok) {
          throw new Error(data.error || '分析失敗')
        }

        renderResult(data)

        const { error: insertError } = await supabase
          .from('analyses')
          .insert([
            {
              user_id: user.id,
              input_text: inputText,
              result: data
            }
          ])

        if (insertError) {
          console.error('寫入 analyses 失敗:', insertError)
        }
      } catch (error) {
        console.error(error)
        resultEl.innerHTML = `<p class="error">發生錯誤：${escapeHtml(error.message)}</p>`
      } finally {
        setLoadingState(false)
      }
    })

    checkLogin()
  </script>
</body>
</html>
