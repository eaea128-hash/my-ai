<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Archie — 金融合規決策引擎</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 這裡保留您原本精美的 CSS 樣式，不做更動以維持視覺一致性 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #006633; --green-dark: #004d26; --gold: #c8961e; --bg: #f8fafc;
      --sur: #ffffff; --navy: #1e293b; --bd: #e2e8f0; --muted: #64748b;
      --text: #334155; --red-bg: #fff1f2; --red-bd: #fecdd3; --red-tx: #9f1239;
      --yel-bg: #fefce8; --yel-bd: #fef08a; --yel-tx: #854d0e;
      --grn-bg: #f0fdf4; --grn-bd: #bbf7d0; --grn-tx: #166534;
    }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--green); height: 58px; display: flex; align-items: center; padding: 0 28px; color: #fff; position: sticky; top: 0; z-index: 200; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .topbar-brand { font-size: 18px; font-weight: 700; }
    .shell { display: grid; grid-template-columns: 400px 1fr; min-height: calc(100vh - 58px); }
    .left-panel { background: var(--sur); border-right: 1px solid var(--bd); padding: 24px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .field label { font-size: 11px; font-weight: 700; color: var(--green); margin-bottom: 6px; display: block; }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--bd); border-radius: 8px; font-size: 13px; }
    .sbtn { padding: 7px 15px; border-radius: 7px; border: 1.5px solid var(--bd); font-size: 12px; cursor: pointer; background: #fff; }
    .sbtn.on { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-gen { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .right-panel { padding: 28px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    .sec { background: var(--sur); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .sch { background: #f1f5f9; padding: 12px 20px; font-size: 11px; font-weight: 700; border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; }
    .scb { padding: 20px; }
    .headline { font-size: 21px; font-weight: 800; color: var(--green); margin-bottom: 10px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 15px; }
    .kpi-val { font-size: 18px; font-weight: 700; color: var(--green); }
    .kpi-bar-bg { height: 5px; background: var(--bd); border-radius: 3px; margin: 5px 0; overflow: hidden; }
    .kpi-bar { height: 100%; background: var(--green); width: 0%; transition: width 1s ease; }
    .dp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .dp-card { padding: 16px; border-radius: 10px; border: 1px solid; font-size: 12px; }
    .dp-cost { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-tx); }
    .dp-decide { background: var(--yel-bg); border-color: var(--yel-bd); color: var(--yel-tx); }
    .dp-min { background: var(--grn-bg); border-color: var(--grn-bd); color: var(--grn-tx); }
    .ppt-slide { border: 1px solid var(--bd); border-radius: 8px; margin-bottom: 12px; }
    .ppt-head { background: var(--navy); color: #fff; padding: 10px 16px; font-weight: 700; font-size: 13px; }
    .ppt-body { padding: 14px 16px; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .cloud-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .cloud-table th, .cloud-table td { padding: 10px; border-bottom: 1px solid var(--bd); text-align: left; }
    .loader { padding: 80px; text-align: center; color: var(--green); }
    .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: var(--green); border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <div><span class="topbar-brand">Smart Archie</span><span style="opacity:0.6; font-size:12px; margin-left:8px;">| 金融合規引擎</span></div>
  <div id="user-email" style="font-size:12px;"></div>
</div>

<div class="shell">
  <div class="left-panel">
    <div class="field"><label>專案名稱</label><input id="f-name" type="text" placeholder="輸入專案名稱..."></div>
    <div class="field"><label>業務痛點描述</label><textarea id="f-desc" placeholder="請描述現狀..."></textarea></div>
    <div class="field"><label>6R 策略</label>
      <select id="f-6r">
        <option value="Rehost">Rehost - 直接搬遷</option>
        <option value="Replatform">Replatform - 平台修整</option>
        <option value="Refactor">Refactor - 重構</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>預算</label>
        <select id="f-budget"><option value="m">500萬-2000萬</option><option value="l">2000萬-5000萬</option></select>
      </div>
      <div class="field"><label>委外性質</label>
        <select id="f-compliance"><option value="critical">重大委外</option><option value="normal">一般委外</option></select>
      </div>
    </div>
    <div class="field"><label>風格</label>
      <div class="style-btns">
        <button class="sbtn on" id="btn-exec">高層決策版</button>
        <button class="sbtn" id="btn-pm">技術 PM 版</button>
      </div>
    </div>
    <button class="btn-gen" id="btn-gen">✦ 生成分析報告</button>
  </div>

  <div class="right-panel" id="right-panel">
    <div style="text-align:center; padding-top:100px; color:#94a3b8;">請填寫左側資訊並點擊生成。</div>
  </div>
</div>

<script>
  let currentStyle = 'exec';
  let chartInstance = null;
  const $ = id => document.getElementById(id);

  // 風格切換
  $('btn-exec').onclick = function() { currentStyle = 'exec'; this.classList.add('on'); $('btn-pm').classList.remove('on'); };
  $('btn-pm').onclick = function() { currentStyle = 'pm'; this.classList.add('on'); $('btn-exec').classList.remove('on'); };

  async function generate() {
    const name = $('f-name').value || '未命名專案';
    const desc = $('f-desc').value;
    const btn = $('btn-gen');
    
    btn.disabled = true;
    $('right-panel').innerHTML = `<div class="loader"><div class="spinner"></div><div>AI 正在依據金管會規範進行合規建模...</div></div>`;

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          projectName: name, 
          description: desc, 
          style: currentStyle,
          strategy: $('f-6r').value,
          compliance: $('f-compliance').value
        })
      });

      const data = await res.json();
      // 關鍵：修正資料抓取邏輯，適配不同的後端回傳格式
      let resultText = "";
      if (data.result) resultText = data.result;
      else if (data.content) resultText = data.content.map(c => c.text).join('');
      
      const cleaned = resultText.replace(/```json|```/gi, '').trim();
      const d = JSON.parse(cleaned);
      
      renderResult(d);
    } catch (e) {
      $('right-panel').innerHTML = `<div class="loader" style="color:red;">分析發生錯誤：${e.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderResult(d) {
    const kpis = d.kpis || { compliance: 70, lz: 70, tech: 70, roi: 70, timeline: 70 };
    const styleLabel = currentStyle === 'exec' ? '高層決策版' : '技術 PM 版';
    
    let html = `
      <div class="sec">
        <div class="sch">EXECUTIVE SUMMARY <span style="opacity:0.5">${styleLabel}</span></div>
        <div class="scb">
          <div class="headline">${d.headline || '策略評估報告'}</div>
          <p style="font-size:13px; line-height:1.7;">${d.execText || ''}</p>
          <div class="kpi-grid">
            ${['compliance', 'lz', 'tech', 'roi', 'timeline'].map(k => `
              <div class="kpi-item">
                <div class="kpi-val">${kpis[k]}</div>
                <div class="kpi-bar-bg"><div class="kpi-bar" id="bar-${k}" style="width:0%"></div></div>
                <div class="kpi-label">${k}</div>
              </div>
            `).join('')}
          </div>
          <div style="height:250px; margin-top:20px;"><canvas id="radarCanvas"></canvas></div>
        </div>
      </div>

      <div class="sec">
        <div class="sch">☁️ 雲端廠商合規比對</div>
        <table class="cloud-table">
          <tr><th>廠商</th><th>符合度</th><th>建議行動</th></tr>
          ${(d.cloudComparison || []).map(c => `<tr><td><b>${c.name}</b></td><td>${c.lz}</td><td>${c.action}</td></tr>`).join('')}
        </table>
      </div>
    `;

    // 只有高層版顯示 PPT 與 決策點
    if (currentStyle === 'exec') {
      html += `
        <div class="sec">
          <div class="sch">📊 PPT 策略大綱</div>
          <div class="scb">
            ${(d.pptSlides || []).map(s => `
              <div class="ppt-slide">
                <div class="ppt-head">SLIDE ${s.num}: ${s.title}</div>
                <div class="ppt-body">${(s.bullets || []).map(b => `• ${b}<br>`).join('')}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="sec">
          <div class="sch">🎯 KEY DECISION POINTS</div>
          <div class="scb">
            <div class="dp-grid">
              <div class="dp-card dp-cost"><b>不行動代價</b><br>${(d.decisions?.cost || []).join('<br>')}</div>
              <div class="dp-card dp-decide"><b>關鍵決策點</b><br>${(d.decisions?.decide || []).join('<br>')}</div>
              <div class="dp-card dp-min"><b>MVP 必做</b><br>${(d.decisions?.min || []).join('<br>')}</div>
            </div>
          </div>
        </div>
      `;
    }

    $('right-panel').innerHTML = html;

    // 動態條動畫
    setTimeout(() => {
      Object.keys(kpis).forEach(k => {
        const bar = $('bar-' + k);
        if (bar) bar.style.width = kpis[k] + '%';
      });
    }, 100);

    // 繪製圖表
    const ctx = $('radarCanvas').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['合規', 'LZ', '技術債', '效益', '時程'],
        datasets: [{
          label: '專案評分',
          data: [kpis.compliance, kpis.lz, kpis.tech, kpis.roi, kpis.timeline],
          borderColor: '#006633', backgroundColor: 'rgba(0,102,51,0.05)'
        }]
      },
      options: { maintainAspectRatio: false }
    });
  }

  $('btn-gen').onclick = generate;
</script>

</body>
</html>
