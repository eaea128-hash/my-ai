<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Archie — 合規決策引擎</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #006633;
      --green-dark: #004d26;
      --gold: #c8961e;
      --bg: #f8fafc;
      --sur: #ffffff;
      --navy: #1e293b;
      --bd: #e2e8f0;
      --muted: #64748b;
      --text: #334155;
      --red-bg: #fff1f2;
      --red-bd: #fecdd3;
      --red-tx: #9f1239;
      --yel-bg: #fefce8;
      --yel-bd: #fef08a;
      --yel-tx: #854d0e;
      --grn-bg: #f0fdf4;
      --grn-bd: #bbf7d0;
      --grn-tx: #166534;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--green);
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 200;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .topbar-brand { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
    .topbar-sub { font-weight: 300; font-size: 13px; margin-left: 10px; opacity: 0.75; }
    .topbar-badge {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
    }
    #user-email { font-size: 12px; opacity: 0.7; }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-columns: 400px 1fr;
      min-height: calc(100vh - 58px);
    }

    /* ── Left Panel ── */
    .left-panel {
      background: var(--sur);
      border-right: 1px solid var(--bd);
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--bd);
    }
    .field label {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 6px;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      background: #fdfdfd;
      font-size: 13px;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,102,51,0.1);
    }
    textarea { resize: vertical; min-height: 80px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Style toggle */
    .style-btns { display: flex; gap: 6px; }
    .sbtn {
      padding: 7px 15px;
      border-radius: 7px;
      border: 1.5px solid var(--bd);
      font-size: 12px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      background: #fff;
      color: var(--muted);
      transition: 0.2s;
    }
    .sbtn.on { background: var(--green); color: #fff; border-color: var(--green); }

    /* Generate button */
    .btn-gen {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .btn-gen:hover:not(:disabled) { background: var(--green-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,102,51,0.25); }
    .btn-gen:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Right Panel ── */
    .right-panel {
      padding: 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Cards ── */
    .sec {
      background: var(--sur);
      border: 1px solid var(--bd);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    .sch {
      background: #f1f5f9;
      padding: 12px 20px;
      font-size: 11px;
      font-weight: 700;
      color: var(--navy);
      border-bottom: 1px solid var(--bd);
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.3px;
    }
    .sch-badge {
      background: var(--grn-bg);
      color: var(--grn-tx);
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 10px;
      border: 1px solid var(--grn-bd);
      font-weight: 500;
    }
    .scb { padding: 20px; }

    /* Headline */
    .headline {
      font-size: 21px;
      font-weight: 800;
      color: var(--green);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .six-r-tag {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 11px;
      margin-right: 6px;
      font-weight: 600;
    }
    .compliance-tag {
      display: inline-block;
      background: #fff8e1;
      color: #b45309;
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 11px;
      border: 1px solid #fde68a;
    }
    .exec-text {
      font-size: 13px;
      line-height: 1.85;
      color: var(--text);
      margin-top: 10px;
    }

    /* KPI bars */
    .kpi-section { margin-top: 18px; }
    .kpi-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .kpi-item { text-align: center; }
    .kpi-val { font-size: 18px; font-weight: 700; color: var(--green); }
    .kpi-bar-bg { height: 5px; background: var(--bd); border-radius: 3px; margin: 5px 0; overflow: hidden; }
    .kpi-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width 1s ease; }
    .kpi-label { font-size: 10px; color: var(--muted); }

    /* Radar */
    .radar-wrap { background: #f8fafc; border-radius: 10px; padding: 16px; margin-top: 16px; }

    /* Cloud table */
    .cloud-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    .cloud-table th {
      padding: 10px 12px;
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      background: #f8fafc;
      border-bottom: 1px solid var(--bd);
      font-size: 11px;
    }
    .cloud-table td { padding: 11px 12px; border-bottom: 1px solid var(--bd); vertical-align: top; }
    .cloud-table tr:last-child td { border-bottom: none; }
    .cloud-table tr:hover td { background: #fafbfc; }
    .dot-high { color: var(--green); font-weight: 600; }
    .dot-mid { color: var(--gold); font-weight: 600; }
    .dot-low { color: #be123c; font-weight: 600; }

    /* Decision points */
    .dp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .dp-card { padding: 16px; border-radius: 10px; border: 1px solid; font-size: 12px; line-height: 1.7; }
    .dp-card b { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
    .dp-card ul { padding-left: 14px; }
    .dp-card li { margin-bottom: 3px; }
    .dp-cost { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-tx); }
    .dp-decide { background: var(--yel-bg); border-color: var(--yel-bd); color: var(--yel-tx); }
    .dp-min { background: var(--grn-bg); border-color: var(--grn-bd); color: var(--grn-tx); }

    /* PPT slides */
    .ppt-slide { border: 1px solid var(--bd); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .ppt-head {
      background: var(--navy);
      color: #fff;
      padding: 10px 16px;
      font-weight: 700;
      display: flex;
      gap: 12px;
      font-size: 13px;
    }
    .ppt-head .slide-num { opacity: 0.45; font-weight: 400; }
    .ppt-body { padding: 14px 16px; font-size: 13px; line-height: 1.85; color: var(--muted); }

    /* Risk tags */
    .risk-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .risk-tag {
      background: var(--red-bg);
      color: var(--red-tx);
      border: 1px solid var(--red-bd);
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
    }

    /* Loading & empty */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--green);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-weight: 600; font-size: 14px; color: var(--green); }
    .loader-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--muted);
      text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; opacity: 0.7; max-width: 280px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="topbar">
  <div>
    <span class="topbar-brand">Smart Archie</span>
    <span class="topbar-sub">| 金融合規決策引擎</span>
  </div>
  <div style="display:flex; align-items:center; gap:12px">
    <span id="user-email"></span>
    <span class="topbar-badge">國泰合規強化版</span>
  </div>
</div>

<div class="shell">

  <!-- ── Left Panel ── -->
  <div class="left-panel">
    <div class="panel-title">專案資訊輸入</div>

    <div class="field">
      <label>專案名稱</label>
      <input id="f-name" type="text" placeholder="例如：精算系統搬遷 AWS Landing Zone">
    </div>

    <div class="field">
      <label>業務需求與痛點</label>
      <textarea id="f-desc" placeholder="請描述業務目標，AI 將自動對齊金管會合規框架..."></textarea>
    </div>

    <div class="field">
      <label>國泰上雲策略 (6R)</label>
      <select id="f-6r">
        <option value="Rehost">Rehost — 直接搬遷（速度最快）</option>
        <option value="Replatform">Replatform — 平台修整（兼顧成本與性能）</option>
        <option value="Refactor">Refactor — 重構（雲端原生優化）</option>
        <option value="Rearchitect">Rearchitect — 架構重組（徹底轉型）</option>
        <option value="Retain">Retain — 保留（暫留地端）</option>
        <option value="Retire">Retire — 汰換</option>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label>預算範圍</label>
        <select id="f-budget">
          <option value="m">500萬–2000萬</option>
          <option value="l">2000萬–5000萬</option>
          <option value="xl">5000萬以上</option>
        </select>
      </div>
      <div class="field">
        <label>委外性質</label>
        <select id="f-compliance">
          <option value="critical">重大委外（須報備金管會）</option>
          <option value="normal">一般委外</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>輸出風格</label>
      <div class="style-btns">
        <button class="sbtn on" onclick="setStyle('exec', this)">高層決策版</button>
        <button class="sbtn" onclick="setStyle('pm', this)">技術 PM 版</button>
      </div>
    </div>

    <button class="btn-gen" id="btn-gen" onclick="generate()">✦ 生成專屬報告</button>
  </div>

  <!-- ── Right Panel ── -->
  <div class="right-panel" id="right-panel">
    <div class="empty-state">
      <div class="empty-icon">⬡</div>
      <div class="empty-title">填寫左側表單後，點擊生成報告</div>
      <div class="empty-sub">AI 將自動對齊金管會合規框架與國泰 Landing Zone 規範，生成專屬策略報告</div>
    </div>
  </div>

</div>

<script>
  let currentStyle = 'exec';
  let chartInstance = null;

  // ── Supabase user email (if available) ──
  try {
    if (window.supabase) {
      supabase.auth.getUser().then(({ data }) => {
        if (data?.user?.email) document.getElementById('user-email').textContent = data.user.email;
      });
    }
  } catch(e) {}

  function setStyle(s, el) {
    currentStyle = s;
    document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  }

  async function generate() {
    const name       = document.getElementById('f-name').value.trim() || '未命名專案';
    const desc       = document.getElementById('f-desc').value.trim() || '無詳細說明';
    const r6         = document.getElementById('f-6r').value;
    const budget     = document.getElementById('f-budget').value;
    const compliance = document.getElementById('f-compliance').value;
    const style      = currentStyle;

    const budgetLabel     = { m:'500萬–2000萬', l:'2000萬–5000萬', xl:'5000萬以上' }[budget];
    const complianceLabel = compliance === 'critical' ? '重大委外（須報備金管會）' : '一般委外';

    const panel = document.getElementById('right-panel');
    const btn   = document.getElementById('btn-gen');
    btn.disabled = true;

    panel.innerHTML = `
      <div class="loader">
        <div class="spinner"></div>
        <div class="loader-text">AI 分析中，正在對齊金管會合規框架...</div>
        <div class="loader-sub">依據 6R 策略、預算與委外性質生成報告</div>
      </div>`;

    const systemPrompt = `你是國泰金融集團的資深雲端策略顧問，精通金管會「金融機構作業委託他人處理內部作業規範」、AWS/Azure/GCP Landing Zone 合規規範、ISO 27001、SOC2 與金融業上雲最佳實踐。`;

    const userPrompt = `請根據以下資訊，生成一份國泰金融雲端策略分析報告：

專案名稱：${name}
業務需求與痛點：${desc}
6R 上雲策略：${r6}
預算規模：${budgetLabel}
委外性質：${complianceLabel}
輸出風格：${style === 'exec' ? '高層決策版（含 PPT 投影片大綱與關鍵決策點分析）' : '技術 PM 版（精簡技術摘要）'}

請嚴格以 JSON 格式回覆，不要加任何說明文字、markdown 符號或程式碼區塊，直接輸出純 JSON：
{
  "headline": "報告主標題（20字內，含6R策略與業務關鍵字）",
  "execText": "執行摘要（150-200字，針對${style === 'exec' ? '董事會與高層決策者，強調商業價值與合規風險' : '技術PM，強調架構選型與實施重點'}）",
  "kpis": {
    "compliance": 金管會合規性評分（0-100整數），
    "lz": Landing Zone規範符合度評分（0-100整數），
    "tech": 技術債清除潛力評分（0-100整數），
    "roi": 預算效益比評分（0-100整數），
    "timeline": 時程可行性評分（0-100整數）
  },
  "cloudComparison": [
    {
      "name": "AWS",
      "lz": "高或中或低",
      "pros": "針對本案的核心優勢（50字）",
      "cons": "主要合規挑戰（50字）",
      "action": "具體建議行動（40字）"
    },
    {
      "name": "Azure",
      "lz": "高或中或低",
      "pros": "針對本案的核心優勢（50字）",
      "cons": "主要合規挑戰（50字）",
      "action": "具體建議行動（40字）"
    },
    {
      "name": "GCP",
      "lz": "高或中或低",
      "pros": "針對本案的核心優勢（50字）",
      "cons": "主要合規挑戰（50字）",
      "action": "具體建議行動（40字）"
    }
  ],
  "pptSlides": [
    { "num": 1, "title": "現況與挑戰", "bullets": ["要點1（20字）","要點2（20字）","要點3（20字）"] },
    { "num": 2, "title": "策略建議：${r6}", "bullets": ["要點1","要點2","要點3"] },
    { "num": 3, "title": "金管會合規評估", "bullets": ["要點1","要點2","要點3"] },
    { "num": 4, "title": "投資效益分析", "bullets": ["要點1","要點2","要點3"] },
    { "num": 5, "title": "Phase 1 實施路線圖", "bullets": ["要點1","要點2","要點3"] }
  ],
  "decisions": {
    "cost": ["維持現狀代價1（20字）","代價2","代價3"],
    "decide": ["核心決策點1（20字）","決策點2","決策點3"],
    "min": ["MVP必做項目1（20字）","項目2","項目3"]
  },
  "risks": ["主要風險1（20字）","風險2","風險3","風險4"]
}`;

    try {
     const res = await fetch('/api/analyze', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    name, desc, strategy6R: r6, budget, complianceLevel: compliance,
    style, systemPrompt, userPrompt
  })
});

      if (!res.ok) throw new Error(`API 錯誤：${res.status}`);

      const data = await res.json();
      const rawText = (data.content || []).map(i => i.text || '').join('');
      const cleaned = rawText.replace(/```json|```/gi, '').trim();

      let d;
      try {
        d = JSON.parse(cleaned);
      } catch (parseErr) {
        panel.innerHTML = `<div class="loader" style="color:#be123c">
          <div style="font-size:24px; margin-bottom:12px">⚠</div>
          <div class="loader-text" style="color:#be123c">JSON 解析失敗，請重試</div>
          <div class="loader-sub" style="margin-top:8px; max-width:400px; font-size:11px; opacity:0.7">${cleaned.substring(0, 300)}</div>
        </div>`;
        btn.disabled = false;
        return;
      }

      renderResult(d, r6, compliance, style);

    } catch (err) {
      panel.innerHTML = `<div class="loader" style="color:#be123c">
        <div style="font-size:24px; margin-bottom:12px">⚠</div>
        <div class="loader-text" style="color:#be123c">連線失敗</div>
        <div class="loader-sub">${err.message}</div>
      </div>`;
    }

    btn.disabled = false;
  }

  function renderResult(d, r6, compliance, style) {
    const panel = document.getElementById('right-panel');
    const kpis = d.kpis || { compliance:80, lz:85, tech:70, roi:65, timeline:75 };
    const kpiKeys   = ['compliance','lz','tech','roi','timeline'];
    const kpiLabels = ['金管會合規','LZ 符合度','技術債清除','預算效益','時程可行'];
    const complianceLabel = compliance === 'critical' ? '重大委外' : '一般委外';

    // KPI bars
    const kpiHTML = kpiKeys.map((k, i) => `
      <div class="kpi-item">
        <div class="kpi-val">${kpis[k]}</div>
        <div class="kpi-bar-bg"><div class="kpi-bar" id="kbar-${k}" style="width:0%"></div></div>
        <div class="kpi-label">${kpiLabels[i]}</div>
      </div>`).join('');

    // Cloud table
    const cloudRows = (d.cloudComparison || []).map(c => {
      const dotClass = c.lz === '高' ? 'dot-high' : c.lz === '中' ? 'dot-mid' : 'dot-low';
      return `<tr>
        <td><b>${c.name}</b></td>
        <td><span class="${dotClass}">● ${c.lz}</span></td>
        <td style="font-size:11px; color:#475569">${c.pros}</td>
        <td style="font-size:11px; color:#475569">${c.cons}</td>
        <td style="font-size:11px; color:#475569">${c.action}</td>
      </tr>`;
    }).join('');

    // PPT slides (exec only)
    const pptHTML = style === 'exec' && d.pptSlides ? d.pptSlides.map(s => `
      <div class="ppt-slide">
        <div class="ppt-head">
          <span class="slide-num">SLIDE ${s.num}</span>
          <span>${s.title}</span>
        </div>
        <div class="ppt-body">${(s.bullets || []).map(b => `• ${b}`).join('<br>')}</div>
      </div>`).join('') : '';

    // Decision points (exec only)
    const dpHTML = style === 'exec' && d.decisions ? `
      <div class="sec">
        <div class="sch">🎯 KEY DECISION POINTS</div>
        <div class="scb">
          <div class="dp-grid">
            <div class="dp-card dp-cost">
              <b>維持現狀代價</b>
              <ul>${(d.decisions.cost || []).map(x => `<li>${x}</li>`).join('')}</ul>
            </div>
            <div class="dp-card dp-decide">
              <b>核心決策點</b>
              <ul>${(d.decisions.decide || []).map(x => `<li>${x}</li>`).join('')}</ul>
            </div>
            <div class="dp-card dp-min">
              <b>MVP Phase 1</b>
              <ul>${(d.decisions.min || []).map(x => `<li>${x}</li>`).join('')}</ul>
            </div>
          </div>
        </div>
      </div>` : '';

    // Risk tags
    const riskHTML = (d.risks || []).map(r => `<span class="risk-tag">${r}</span>`).join('');

    panel.innerHTML = `
      <!-- Executive Summary -->
      <div class="sec">
        <div class="sch">
          EXECUTIVE SUMMARY
          <div style="display:flex; gap:8px; align-items:center">
            <span class="sch-badge">V.1版</span>
            <span style="font-size:10px; opacity:0.5">${style === 'exec' ? '高層決策版' : '技術 PM 版'}</span>
          </div>
        </div>
        <div class="scb">
          <div class="headline">${d.headline || '雲端轉型策略評估報告'}</div>
          <div>
            <span class="six-r-tag">策略：${r6}</span>
            <span class="compliance-tag">${complianceLabel}</span>
          </div>
          <p class="exec-text">${d.execText || ''}</p>

          <div class="kpi-section">
            <div class="kpi-section-label">評估維度 KPI</div>
            <div class="kpi-grid">${kpiHTML}</div>
          </div>

          <div class="radar-wrap">
            <canvas id="riskRadar" style="max-height:240px"></canvas>
          </div>
        </div>
      </div>

      <!-- Cloud Comparison -->
      <div class="sec">
        <div class="sch">☁️ CLOUD COMPLIANCE COMPARISON — AWS / Azure / GCP</div>
        <div style="overflow-x:auto">
          <table class="cloud-table">
            <thead><tr>
              <th style="width:65px">廠商</th>
              <th style="width:80px">LZ 符合度</th>
              <th>核心優勢</th>
              <th>合規挑戰</th>
              <th>建議行動</th>
            </tr></thead>
            <tbody>${cloudRows}</tbody>
          </table>
        </div>
      </div>

      ${style === 'exec' ? `
      <!-- PPT Outline -->
      <div class="sec">
        <div class="sch">📊 PPT 策略大綱（彙報專用）</div>
        <div class="scb">${pptHTML}</div>
      </div>` : ''}

      ${dpHTML}

      <!-- Risks -->
      <div class="sec">
        <div class="sch">⚠ 主要風險提示</div>
        <div class="scb">
          <div class="risk-tags">${riskHTML}</div>
        </div>
      </div>
    `;

    // Animate KPI bars
    setTimeout(() => {
      kpiKeys.forEach(k => {
        const el = document.getElementById(`kbar-${k}`);
        if (el) el.style.width = `${kpis[k]}%`;
      });
    }, 80);

    // Render radar chart
    setTimeout(() => {
      const ctx = document.getElementById('riskRadar');
      if (!ctx) return;
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx.getContext('2d'), {
        type: 'radar',
        data: {
          labels: kpiLabels,
          datasets: [{
            label: '本專案評估',
            data: kpiKeys.map(k => kpis[k]),
            borderColor: '#006633',
            backgroundColor: 'rgba(0,102,51,0.08)',
            borderWidth: 2,
            pointBackgroundColor: '#c8961e',
            pointBorderColor: '#fff',
            pointRadius: 5
          }]
        },
        options: {
          maintainAspectRatio: false,
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: { display: false, stepSize: 20 },
              grid: { color: 'rgba(0,0,0,0.07)' },
              pointLabels: { font: { size: 11, family: "'Noto Sans TC', sans-serif" }, color: '#64748b' }
            }
          },
          plugins: {
            legend: { position: 'bottom', labels: { font: { size: 11 }, color: '#64748b' } }
          }
        }
      });
    }, 120);
  }
</script>
</body>
</html>
